name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APK
        # Spotless currently cannot serialize its configuration-cache state.
        # Keep configuration cache enabled locally, but disable it in CI.
        run: ./gradlew assembleRelease --stacktrace -Dorg.gradle.configuration-cache=false

      - name: Publish APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            app/build/outputs/apk/release/app-release.apk \
            --title "PinWear ${GITHUB_REF_NAME}" \
            --generate-notes
