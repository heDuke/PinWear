name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build, test, and lint
        # Spotless currently cannot serialize its configuration-cache state.
        # Keep configuration cache enabled locally, but disable it in CI.
        run: ./gradlew build lintDebug --stacktrace -Dorg.gradle.configuration-cache=false

      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-reports
          path: |
            **/build/reports/
            **/build/test-results/
          if-no-files-found: ignore
